services:
  gm-app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: aelunor-gm-app
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:12b}
      - OLLAMA_TIMEOUT_SEC=${OLLAMA_TIMEOUT_SEC:-300}
      - OLLAMA_SEED=${OLLAMA_SEED:-}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.6}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-32768}
    volumes:
      - ../../07_runtime:/data
      - ./ui/dist:/workspace/ui/dist:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
