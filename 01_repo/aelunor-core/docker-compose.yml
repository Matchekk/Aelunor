version: "3.9"
services:
  gm-app:
    build: ./app
    container_name: aelunor-gm-app
    ports:
      - "8080:8080"
    environment:
      # If Ollama runs on your HOST (recommended on Windows):
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:12b}
      - OLLAMA_TIMEOUT_SEC=${OLLAMA_TIMEOUT_SEC:-300}
      - OLLAMA_SEED=${OLLAMA_SEED:-}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.6}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-8192}
    volumes:
      - ../../07_runtime:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
